<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
    <title>Likith Intelligence | Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f8fafc; }
        h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-hover:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.2); }
        .text-gradient { background: linear-gradient(135deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-gray-950 flex items-center justify-center p-6">
        <div class="glass p-8 rounded-3xl w-full max-w-md text-center">
            <div class="w-16 h-16 bg-amber-500/10 border border-amber-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="shield-check" class="w-8 h-8 text-amber-500"></i>
            </div>
            <h2 class="text-2xl font-display font-bold mb-2">Secure Admin Access</h2>
            <p class="text-slate-400 text-sm mb-8">Enter your secure credentials to initialize the control panel.</p>
            <input type="password" id="admin-token" placeholder="Admin Token" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white mb-4 focus:outline-none focus:border-amber-500/50 transition-colors">
            <button onclick="authenticate()" class="w-full bg-amber-500 text-gray-950 font-bold py-3 rounded-xl hover:bg-amber-400 transition-colors">Initialize Console</button>
        </div>
    </div>

    <!-- Main Console -->
    <div id="main-console" class="hidden opacity-0 transition-opacity duration-1000">
        <!-- Sidebar/Header -->
        <header class="border-b border-white/5 py-6 sticky top-0 bg-gray-950/80 backdrop-blur-xl z-50">
            <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center">
                        <i data-lucide="cpu" class="w-5 h-5 text-amber-500"></i>
                    </div>
                    <div>
                        <h1 class="font-display font-bold text-lg leading-tight">Likith Intelligence</h1>
                        <p class="text-[10px] text-slate-500 tracking-widest uppercase">System Operations Panel</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="px-3 py-1 rounded-full bg-green-500/10 border border-green-500/20 text-[10px] text-green-400 font-bold tracking-widest uppercase">System Online</span>
                    <button onclick="logout()" class="p-2 rounded-lg bg-white/5 border border-white/10 hover:bg-red-500/10 hover:border-red-500/20 transition-colors text-slate-400 hover:text-red-400">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-12">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <div class="glass p-6 rounded-3xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="message-square" class="w-12 h-12"></i></div>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Total Signals</p>
                    <h3 id="stat-total" class="text-3xl font-display font-bold">--</h3>
                </div>
                <div class="glass p-6 rounded-3xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="zap" class="w-12 h-12"></i></div>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Avg Latency</p>
                    <h3 id="stat-latency" class="text-3xl font-display font-bold">--<span class="text-xs ml-1 text-slate-500">ms</span></h3>
                </div>
                <div class="glass p-6 rounded-3xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="shield" class="w-12 h-12"></i></div>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Auth Integrity</p>
                    <h3 class="text-3xl font-display font-bold">100%</h3>
                </div>
            </div>

            <!-- Table Section -->
            <div class="glass rounded-3xl overflow-hidden">
                <div class="p-6 border-b border-white/5 flex items-center justify-between flex-wrap gap-4">
                    <h2 class="text-xl font-display font-bold">Response Logs</h2>
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                            <input type="text" placeholder="Search signals..." class="bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-2 text-sm focus:outline-none focus:border-white/20">
                        </div>
                        <button onclick="fetchData()" class="p-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/[0.02] text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                            <tr>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4">User Intent</th>
                                <th class="px-6 py-4">User Message</th>
                                <th class="px-6 py-4">Latency</th>
                                <th class="px-6 py-4">Timestamp</th>
                                <th class="px-6 py-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="log-body" class="divide-y divide-white/5">
                            <!-- Skeleton -->
                            <tr class="animate-pulse">
                                <td colspan="6" class="p-6"><div class="h-4 bg-white/5 rounded w-full"></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="fixed inset-0 z-[110] bg-gray-950/90 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="glass p-8 rounded-3xl w-full max-w-4xl max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-start mb-8">
                <h2 class="text-2xl font-display font-bold">Signal Analytics</h2>
                <button onclick="closeModal()" class="p-2 rounded-lg hover:bg-white/10 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-2 block">User Message</label>
                    <div id="modal-msg" class="p-4 rounded-2xl bg-white/5 border border-white/10 text-slate-300"></div>
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-2 block">AI Response</label>
                    <div id="modal-resp" class="p-4 rounded-2xl bg-white/5 border border-white/10 text-slate-300 whitespace-pre-wrap leading-relaxed"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-2 block">Intent</label>
                        <div id="modal-intent" class="p-3 rounded-xl bg-white/5 border border-white/10 text-amber-500 font-mono text-xs uppercase"></div>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-2 block">Processing Latency</label>
                        <div id="modal-lat" class="p-3 rounded-xl bg-white/5 border border-white/10 text-slate-300 font-mono text-xs uppercase"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const API_BASE = window.APP_CONFIG?.API_BASE_URL || "https://portfolio-likith.onrender.com";

        function authenticate() {
            const token = document.getElementById('admin-token').value.trim();
            if (!token) return;
            sessionStorage.setItem('admin_token', token);
            initConsole();
        }

        function logout() {
            sessionStorage.removeItem('admin_token');
            location.reload();
        }

        function initConsole() {
            const token = sessionStorage.getItem('admin_token');
            if (token) {
                document.getElementById('auth-overlay').classList.add('hidden');
                const main = document.getElementById('main-console');
                main.classList.remove('hidden');
                setTimeout(() => main.classList.add('opacity-100'), 50);
                fetchData();
            }
        }

        async function fetchData() {
            const token = sessionStorage.getItem('admin_token');
            const tbody = document.getElementById('log-body');
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/responses`, {
                    headers: { 'X-Admin-Token': token }
                });

                if (response.status === 401) {
                    alert("Unauthorized. Resetting console.");
                    logout();
                    return;
                }

                const json = await response.json();
                renderTable(json.data);
                updateStats(json.data, json.pagination.total);
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="6" class="p-12 text-center text-red-500">Failed to sync with neural backend. Check connection.</td></tr>';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('log-body');
            tbody.innerHTML = data.map(item => `
                <tr class="glass-hover transition-colors group">
                    <td class="px-6 py-5">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full ${item.latency < 500 ? 'bg-green-500' : 'bg-amber-500'} animate-pulse"></span>
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Active</span>
                        </div>
                    </td>
                    <td class="px-6 py-5">
                        <span class="px-2 py-1 rounded bg-white/5 border border-white/10 text-[10px] text-amber-500 font-mono uppercase">${item.intent}</span>
                    </td>
                    <td class="px-6 py-5">
                        <p class="text-xs text-slate-300 truncate max-w-[200px]">${item.message}</p>
                    </td>
                    <td class="px-6 py-5">
                        <span class="text-xs font-mono text-slate-500">${item.latency}ms</span>
                    </td>
                    <td class="px-6 py-5">
                        <span class="text-[10px] text-slate-500">${new Date(item.time).toLocaleString()}</span>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <button onclick='viewDetails(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="text-[10px] font-bold text-slate-400 hover:text-white transition-colors uppercase tracking-widest">Analyze</button>
                    </td>
                </tr>
            `).join('');
            if (window.lucide) lucide.createIcons();
        }

        function updateStats(data, total) {
            document.getElementById('stat-total').innerText = total;
            const avg = data.length ? Math.round(data.reduce((acc, curr) => acc + curr.latency, 0) / data.length) : 0;
            document.getElementById('stat-latency').innerText = avg;
        }

        function viewDetails(item) {
            document.getElementById('modal-msg').innerText = item.message;
            document.getElementById('modal-resp').innerText = item.response;
            document.getElementById('modal-intent').innerText = item.intent;
            document.getElementById('modal-lat').innerText = item.latency + 'ms';
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        // Initialize Lucide
        if (window.lucide) lucide.createIcons();
        initConsole();
    </script>
</body>
</html>
