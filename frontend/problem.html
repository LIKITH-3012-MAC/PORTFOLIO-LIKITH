<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Interruption | Likith Naidu</title>

    <!-- Core Metadata -->
    <meta name="description"
        content="Support and fallback page for Likith Naidu's portfolio. Routing issues or technical anomalies are handled here.">
    <meta name="robots" content="noindex, follow">
    <meta name="author" content="Likith Naidu Anumakonda">
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Structured Data: WebPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "System Interruption | Likith Naidu Portfolio",
      "description": "Fallback page for handling technical anomalies and providing contact guidance.",
      "url": "https://likith-portfolio.online/problem.html"
    }
    </script>

    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Apple-like Monochrome Aesthetics */
        body {
            background-color: #030712;
            color: #f8fafc;
        }
        .mono-icon-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 selection:bg-white/20 selection:text-white">

    <div class="max-w-2xl w-full text-center reveal">
        <!-- Error Icon -->
        <div class="w-24 h-24 rounded-3xl mono-icon-container flex items-center justify-center text-white mx-auto mb-8 animate-pulse">
            <i data-lucide="shield-alert" class="w-10 h-10 opacity-80"></i>
        </div>

        <h1 class="text-4xl md:text-5xl font-display font-bold tracking-tight mb-6 text-white">System <br/> Interruption.</h1>

        <p class="text-slate-400 text-lg mb-12 font-light leading-relaxed max-w-lg mx-auto">
            The connection encountered a technical anomaly. Our digital architecture is designed to recover gracefully. Please choose a path forward.
        </p>

        <div class="flex flex-wrap justify-center gap-4 mb-16">
            <button onclick="window.history.back()" class="px-6 py-3 rounded-full bg-white text-black font-medium text-sm flex items-center gap-2 hover:bg-slate-200 transition-colors">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Retry Action
            </button>
            <a href="index.html" class="px-6 py-3 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2 hover:bg-white/10 transition-colors">
                <i data-lucide="home" class="w-4 h-4"></i> Back to Portfolio
            </a>
        </div>

        <!-- Contact Fallback -->
        <div class="glass-panel p-8 rounded-[2rem] border border-white/10 text-left max-w-md mx-auto hover:border-white/20 transition-colors duration-500">
            <h3 class="text-white font-medium mb-4 flex items-center gap-2">
                <i data-lucide="mail" class="w-4 h-4 text-slate-400"></i> Direct Support Channel
            </h3>
            <div class="space-y-4">
                <a href="mailto:likith.anumakonda@gmail.com"
                    class="flex items-center justify-between group p-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition-colors">
                    <span class="text-sm text-slate-300 font-light">likith.anumakonda@gmail.com</span>
                    <i data-lucide="arrow-up-right" class="w-3 h-3 text-slate-500 group-hover:text-white transition-colors"></i>
                </a>
                <a href="collab.html" class="flex items-center justify-between group p-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition-colors">
                    <span class="text-sm text-slate-300 font-light">Open Collaboration Form</span>
                    <i data-lucide="arrow-right" class="w-3 h-3 text-slate-500 group-hover:text-white transition-colors"></i>
                </a>
            </div>
        </div>

        <p class="mt-12 text-[10px] text-slate-600 uppercase tracking-[0.2em] font-mono">Error Code: 500 • State: Offline</p>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        setTimeout(() => {
            document.querySelector('.reveal').classList.add('active');
        }, 100);
    </script>
</body>

</html>
