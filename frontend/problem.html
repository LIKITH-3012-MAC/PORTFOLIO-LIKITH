<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Interruption | Likith Naidu</title>

    <!-- Core Metadata -->
    <meta name="description"
        content="Support and fallback page for Likith Naidu's portfolio. Routing issues or technical anomalies are handled here.">
    <meta name="robots" content="noindex, follow">
    <meta name="author" content="Likith Naidu Anumakonda">
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Structured Data: WebPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "System Interruption | Likith Naidu Portfolio",
      "description": "Fallback page for handling technical anomalies and providing contact guidance.",
      "url": "https://likith-portfolio.online/problem.html"
    }
    </script>

    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Apple-like Monochrome Aesthetics */
        body {
            background-color: #030712;
            color: #f8fafc;
        }
        .mono-icon-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 selection:bg-white/20 selection:text-white">

    <div class="max-w-2xl w-full text-center reveal">
        <!-- Error Icon -->
        <div class="w-24 h-24 rounded-3xl mono-icon-container flex items-center justify-center text-white mx-auto mb-8 animate-pulse">
            <i data-lucide="shield-alert" class="w-10 h-10 opacity-80"></i>
        </div>

        <h1 id="page-title" class="text-4xl md:text-5xl font-display font-bold tracking-tight mb-6 text-white opacity-0 transition-opacity duration-500">Processing...</h1>

        <p id="page-message" class="text-slate-400 text-lg mb-12 font-light leading-relaxed max-w-lg mx-auto opacity-0 transition-opacity duration-500">
            Analyzing system state...
        </p>

        <div id="page-buttons" class="flex flex-wrap justify-center gap-4 mb-16 opacity-0 transition-opacity duration-500">
            <!-- Buttons injected by JS -->
        </div>



        <p id="error-code" class="mt-12 text-[10px] text-slate-600 uppercase tracking-[0.2em] font-mono">Error Code: 500 • State: Offline</p>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            const result = params.get("result");
            const type = params.get("type");
            const source = params.get("source");
            const code = params.get("code");
            const reason = params.get("reason");
            const state = params.get("state");
            const token = params.get("token");
            const titleEl = document.getElementById("page-title");
            const msgEl = document.getElementById("page-message");
            const buttonsEl = document.getElementById("page-buttons");
            const codeEl = document.getElementById("error-code");

            // Priority Rule: Error indicators override success
            const hasErrorIndicators = code || state || reason;
            const isSuccess = result === 'success' && type === 'collab' && id && token && !hasErrorIndicators;

            if (isSuccess) {
                // Initial Verifying State
                titleEl.innerHTML = "Verifying <br/> Submission.";
                msgEl.innerHTML = "Please wait while Likith’s system confirms your request...";
                buttonsEl.innerHTML = `
                    <div class="flex items-center gap-3 text-slate-500 text-sm font-mono">
                        <div class="w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                        Authenticating Secure Token...
                    </div>
                `;
                codeEl.textContent = `Status: Verifying • ID: ${id}`;

                // Call Backend Verification
                fetch(`${window.APP_CONFIG.API_BASE_URL}/api/collab/verify?id=${id}&token=${token}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.verified) {
                            titleEl.innerHTML = "Request <br/> Submitted.";
                            msgEl.innerHTML = "Your collaboration request has been securely stored and verified. I will review it and get back to you soon.";
                            buttonsEl.innerHTML = `
                                <a href="index.html" class="px-6 py-3 rounded-full bg-white text-black font-medium text-sm flex items-center gap-2 hover:bg-slate-200 transition-colors">
                                    <i data-lucide="home" class="w-4 h-4"></i> Back to Portfolio
                                </a>
                                <a href="mailto:likith.anumakonda@gmail.com" class="px-6 py-3 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2 hover:bg-white/10 transition-colors">
                                    <i data-lucide="mail" class="w-4 h-4"></i> Contact Likith
                                </a>
                            `;
                            codeEl.textContent = `Status: Verified • ID: ${id} • Reference: ${data.id}`;
                        } else {
                            // Verification failed (Fake or Expired)
                            titleEl.innerHTML = "Verification <br/> Required.";
                            msgEl.innerHTML = data.message || "This submission link is invalid or has expired. For security, we require a fresh submission.";
                            buttonsEl.innerHTML = `
                                <a href="collab.html" class="px-6 py-3 rounded-full bg-white text-black font-medium text-sm flex items-center gap-2 hover:bg-slate-200 transition-colors">
                                    <i data-lucide="file-text" class="w-4 h-4"></i> Open Collab Form
                                </a>
                                <a href="index.html" class="px-6 py-3 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2 hover:bg-white/10 transition-colors">
                                    <i data-lucide="home" class="w-4 h-4"></i> Portfolio
                                </a>
                            `;
                            codeEl.textContent = `Status: Invalid • Reason: ${data.reason || 'unauthorized'}`;
                        }
                        if (window.lucide) lucide.createIcons();
                    })
                    .catch(err => {
                        titleEl.innerHTML = "System <br/> Interruption.";
                        msgEl.innerHTML = "The verification service is currently unreachable. Please try again or contact support.";
                        buttonsEl.innerHTML = `
                             <button onclick="window.location.reload()" class="px-6 py-3 rounded-full bg-white text-black font-medium text-sm flex items-center gap-2 hover:bg-slate-200 transition-colors">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Retry Verification
                            </button>
                        `;
                        codeEl.textContent = `Status: Error • State: Verification_Offline`;
                        if (window.lucide) lucide.createIcons();
                    });
            } else if (result === 'success' && type === 'collab' && !token) {
                titleEl.innerHTML = "Verification <br/> Required.";
                msgEl.innerHTML = "For security, success confirmation requires a valid verification token. Please submit the form to receive one.";
                buttonsEl.innerHTML = `
                    <a href="collab.html" class="px-6 py-3 rounded-full bg-white text-black font-medium text-sm flex items-center gap-2 hover:bg-slate-200 transition-colors">
                        <i data-lucide="file-text" class="w-4 h-4"></i> Open Collab Form
                    </a>
                    <a href="index.html" class="px-6 py-3 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2 hover:bg-white/10 transition-colors">
                        <i data-lucide="home" class="w-4 h-4"></i> Portfolio
                    </a>
                `;
                codeEl.textContent = `Status: Unauthorized • Reason: Missing_Token`;
            } else if ((result === 'failed' && type === 'collab') || (hasErrorIndicators && code)) {
                titleEl.innerHTML = "Submission <br/> Failed.";
                msgEl.innerHTML = "The server could not store your request.";
                buttonsEl.innerHTML = `
                    <button onclick="window.history.back()" class="px-6 py-3 rounded-full bg-white text-black font-medium text-sm flex items-center gap-2 hover:bg-slate-200 transition-colors">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Try Again
                    </button>
                    <a href="mailto:likith.anumakonda@gmail.com" class="px-6 py-3 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2 hover:bg-white/10 transition-colors">
                        <i data-lucide="mail" class="w-4 h-4"></i> Contact Likith
                    </a>
                `;
                codeEl.textContent = `Status: Failed • Type: Collab${code ? ' • Error Code: ' + code : ''}${reason ? ' • Reason: ' + decodeURIComponent(reason) : ''}`;
            } else if ((result === 'error' && type === 'collab') || hasErrorIndicators) {
                titleEl.innerHTML = "System <br/> Interruption.";
                msgEl.innerHTML = "The backend connection was interrupted or offline.";
                buttonsEl.innerHTML = `
                    <button onclick="window.history.back()" class="px-6 py-3 rounded-full bg-white text-black font-medium text-sm flex items-center gap-2 hover:bg-slate-200 transition-colors">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Retry
                    </button>
                    <a href="mailto:likith.anumakonda@gmail.com" class="px-6 py-3 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2 hover:bg-white/10 transition-colors">
                        <i data-lucide="mail" class="w-4 h-4"></i> Contact Likith
                    </a>
                `;
                codeEl.textContent = `Status: Error • Type: Collab${state ? ' • State: ' + state : ''}`;
            } else if (result === 'error' && type === 'chatbot') {
                titleEl.innerHTML = "AI Agent <br/> Support.";
                msgEl.innerHTML = "Likith’s AI Agent encountered a technical issue.";
                buttonsEl.innerHTML = `
                    <a href="index.html" class="px-6 py-3 rounded-full bg-white text-black font-medium text-sm flex items-center gap-2 hover:bg-slate-200 transition-colors">
                        <i data-lucide="home" class="w-4 h-4"></i> Back to Portfolio
                    </a>
                    <a href="mailto:likith.anumakonda@gmail.com" class="px-6 py-3 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2 hover:bg-white/10 transition-colors">
                        <i data-lucide="mail" class="w-4 h-4"></i> Contact Likith
                    </a>
                `;
                codeEl.textContent = `Status: Error • Type: Chatbot`;
            } else {
                // Default fallback state if accessed without params
                titleEl.innerHTML = "System <br/> Interruption.";
                msgEl.innerHTML = "The connection encountered a technical anomaly. Our digital architecture is designed to recover gracefully. Please choose a path forward.";
                buttonsEl.innerHTML = `
                    <button onclick="window.history.back()" class="px-6 py-3 rounded-full bg-white text-black font-medium text-sm flex items-center gap-2 hover:bg-slate-200 transition-colors">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Retry Action
                    </button>
                    <a href="index.html" class="px-6 py-3 rounded-full bg-white/5 border border-white/10 text-white font-medium text-sm flex items-center gap-2 hover:bg-white/10 transition-colors">
                        <i data-lucide="home" class="w-4 h-4"></i> Back to Portfolio
                    </a>
                `;
                codeEl.textContent = `Error Code: 500 • State: Offline`;
            }

            // Reveal content after setting it
            titleEl.classList.remove('opacity-0');
            msgEl.classList.remove('opacity-0');
            buttonsEl.classList.remove('opacity-0');

            if (window.lucide) {
                lucide.createIcons();
            }
        });
        
        setTimeout(() => {
            document.querySelector('.reveal').classList.add('active');
        }, 100);
    </script>
</body>
</html>
